# Mirror personal main → heff-industries/animalgaragenet for Netlify.
#
# Auth: deploy key on the org repo (secret ORG_REPO_DEPLOY_KEY on this repo).
# Deploy keys cannot push .github/workflows — we mirror an orphan snapshot WITHOUT
# that folder. CI/workflows stay on jjheffernan/animalgaragenet only.
#
# Setup: ./scripts/setup-org-sync-auth.sh
#
# Note: GitHub Actions secrets never show token values in the UI — only secret names.

name: Sync main to org

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-org-main
  cancel-in-progress: false

jobs:
  sync:
    if: >
      github.repository == 'jjheffernan/animalgaragenet' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout vetted main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify deploy key secret
        env:
          ORG_REPO_DEPLOY_KEY: ${{ secrets.ORG_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$ORG_REPO_DEPLOY_KEY" ]; then
            echo "::error::ORG_REPO_DEPLOY_KEY missing. Run: ./scripts/setup-org-sync-auth.sh"
            exit 1
          fi

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORG_REPO_DEPLOY_KEY }}

      - name: Mirror to org (workflows excluded)
        env:
          SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          bash scripts/sync-org-mirror.sh "$SOURCE_SHA" git@github.com:heff-industries/animalgaragenet.git

      - name: Summary
        run: echo "Org mirror updated from $(git rev-parse --short HEAD)"
