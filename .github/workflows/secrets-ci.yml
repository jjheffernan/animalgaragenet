name: Secrets and leak guard

# Hardening: gitleaks on every PR/push; client bundle scan after production build.
# Does not print secret values. Complements scripts/check-secrets.sh in main CI.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: secrets-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks:
    if: github.repository == 'jjheffernan/animalgaragenet'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (tracked history + working tree)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-secrets:
    if: github.repository == 'jjheffernan/animalgaragenet'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pre-build secret guard
        run: bash scripts/check-secrets.sh

      - name: Production build (no integration secrets in env)
        run: npm run build
        env:
          SUPABASE_DATABASE_URL: ''
          SUPABASE_ANON_KEY: ''
          PUBLIC_SALEOR_API_URL: ''

      - name: Post-build client bundle scan
        run: CHECK_CLIENT_BUNDLE=1 bash scripts/check-secrets.sh

  github-secrets-audit:
    if: github.repository == 'jjheffernan/animalgaragenet'
    runs-on: ubuntu-latest
    # GITHUB_TOKEN cannot list Actions secrets — audit runs locally via npm run secrets:audit
    steps:
      - name: GitHub secrets audit is local-only
        run: |
          echo "SKIP: Actions GITHUB_TOKEN cannot list repository secrets."
          echo "Maintainers: run npm run secrets:audit locally after npm run secrets:push"
