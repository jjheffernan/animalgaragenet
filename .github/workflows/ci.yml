name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    # Org repo is a deploy mirror; CI runs on the personal repo before sync.
    if: github.repository == 'jjheffernan/animalgaragenet'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret and credential guard
        run: bash scripts/check-secrets.sh

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Contract tests
        run: npm run test:contracts

      - name: Live Saleor smoke (env-gated)
        run: npm run test:unit -- tests/integration/saleor-live.test.ts
        env:
          PUBLIC_SALEOR_API_URL: ${{ secrets.PUBLIC_SALEOR_API_URL }}
          SALEOR_CHANNEL: ${{ secrets.SALEOR_CHANNEL }}
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          SUPABASE_DATABASE_URL: ''
          SUPABASE_ANON_KEY: ''
          PUBLIC_SALEOR_API_URL: ''

      - name: Post-build client bundle secret scan
        run: CHECK_CLIENT_BUNDLE=1 bash scripts/check-secrets.sh

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
