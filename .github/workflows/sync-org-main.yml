# After CI passes on main in the personal repo, mirror main to the org repo
# used by Netlify (heff-industries/animalgaragenet).
#
# Auth: deploy key on heff-industries/animalgaragenet (secret ORG_REPO_DEPLOY_KEY).
# GitHub does not allow creating fine-grained PATs via API; a deploy key is the
# recommended CI pattern for repo-to-repo mirroring.
#
# Manual re-sync: Actions → Sync main to org → Run workflow.

name: Sync main to org

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-org-main
  cancel-in-progress: false

jobs:
  sync:
    if: >
      github.repository == 'jjheffernan/animalgaragenet' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout vetted main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Verify deploy key secret
        env:
          ORG_REPO_DEPLOY_KEY: ${{ secrets.ORG_REPO_DEPLOY_KEY }}
        run: |
          if [ -z "$ORG_REPO_DEPLOY_KEY" ]; then
            echo "::error::ORG_REPO_DEPLOY_KEY is not set."
            exit 1
          fi

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ORG_REPO_DEPLOY_KEY }}

      - name: Push main to heff-industries/animalgaragenet
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git remote add org git@github.com:heff-industries/animalgaragenet.git
          git push org HEAD:refs/heads/main

      - name: Summary
        run: echo "Synced $(git rev-parse --short HEAD) to heff-industries/animalgaragenet main"
